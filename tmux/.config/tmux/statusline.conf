# vim: ft=tmux
set -g mode-style "fg=#d8dee9,bg=#3b4252"

set -g message-style "fg=#d8dee9,bg=#3b4252"
set -g message-command-style "fg=#d8dee9,bg=#3b4252"

set -g pane-border-style "fg=#d8dee9"
set -g pane-active-border-style "fg=#a3be8c"

set -g status "on"
set -g status-interval 1
set -g status-justify "left"

set -g status-style "fg=#3b4252,bg=#3b4252"

set -g status-bg "#3b4252"

set -g status-left-length "100"
set -g status-right-length "100"

set -g status-left-style NONE
set -g status-right-style NONE

set -g status-left "#[fg=#81a1c1,bg=#434c5e,bold] #S #[fg=#434c5e,bg=#81a1c1,nobold,nounderscore,noitalics]#[fg=#2e3440,bg=#81a1c1,bold] #(whoami) #[fg=#81a1c1,bg=#3b4252]"
set -g status-right "#[fg=#434c5e,bg=#3b4252,nobold,nounderscore,noitalics]#[fg=#81a1c1,bg=#434c5e]#[fg=#4c566a,bg=#434c5e,nobold,nounderscore,noitalics]#[fg=#81a1c1,bg=#4c566a]#[fg=#81a1c1,bg=#4c566a,nobold,nounderscore,noitalics]#[fg=#2e3440,bg=#81a1c1,bold] #h "

setw -g window-status-activity-style "underscore,fg=#3b4252,bg=#3b4252"
setw -g window-status-separator ""
setw -g window-status-style "NONE,fg=#3b4252,bg=#3b4252"
setw -g window-status-format '#[fg=#3b4252,bg=#3b4252]#[default] #I  #{b:pane_current_path} #[fg=#3b4252,bg=#3b4252,nobold,nounderscore,noitalics]'
setw -g window-status-current-format '#[fg=#3b4252,bg=#3b4252]#[fg=#d08770,bg=#3b4252] #I #[fg=#3b4252,bg=#d08770, bold] #{b:pane_current_path} #[fg=#d08770,bg=#3b4252,bold]'
