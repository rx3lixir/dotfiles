# ----------
# Decoration
# See https://wiki.hyprland.org/Configuring/Variables/ for more
# ----------

decoration {
  blur {
    enabled = true
    size = 8
    xray = true 
    new_optimizations = on
    brightness = 1
    contrast = 1
    passes = 3
    ignore_opacity = true 
  }   
  shadow {
    enabled = true
    range = 20
    render_power = 3
    offset = 1 2
    scale = 2
    color = rgba(16161ed4)
  }
  rounding = 4
}
